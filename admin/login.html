<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Administration - Connexion">
  <title>Admin Login - HB Team</title>
  <link rel="stylesheet" href="css/admin.css">
  <link rel="icon" type="image/png" href="../assets/images/logo.png">
</head>

<body>

  <div class="toast-container-admin"></div>

  <div class="login-page">
    <div class="login-container">
      <div class="login-card">
        <div class="login-logo">
          <img src="../assets/images/logo.png" alt="Logo">
          <h1>HB<span>Team</span></h1>
          <p>Panneau d'Administration</p>
        </div>

        <form onsubmit="handleLogin(event)">
          <div id="login-error" class="form-error"></div>

          <div class="form-group">
            <label>Email</label>
            <div class="form-input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
                <polyline points="22,6 12,13 2,6" />
              </svg>
              <input type="email" id="login-email" class="form-input" placeholder="admin@hbteam.sn" required>
            </div>
          </div>

          <div class="form-group">
            <label>Mot de passe</label>
            <div class="form-input-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
              <input type="password" id="login-password" class="form-input" placeholder="••••••••" required>
            </div>
          </div>

          <div class="form-row">
            <div class="form-checkbox">
              <input type="checkbox" id="remember">
              <label for="remember">Se souvenir</label>
            </div>
            <a href="#" class="form-link">Mot de passe oublié ?</a>
          </div>

          <button type="submit" class="btn btn-primary" id="login-submit">
            <span class="login-loader"></span>
            <span class="btn-text">Se Connecter</span>
          </button>
        </form>

        <div class="login-footer">
          <p>🔒 Accès réservé aux administrateurs</p>
          <p style="margin-top: 8px;">
            <a href="../index.html">← Retour au site</a>
          </p>
        </div>
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
</body>

</html>
